name: Mirror to GitHub
on:
  push:
    branches: ["**"]
    tags: ["v*"]
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to GitHub mirror
        env:
          GH_MIRROR_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
        run: |
          remote="https://x-access-token:${GH_MIRROR_TOKEN}@github.com/Capacium/claude-code-capacium.git"
          # Mirror exactly the ref that triggered this run (branch or tag). No --prune
          # and no 'refs/heads/*' wildcard: the CI checkout only has this one ref
          # locally, so a pruning wildcard push would try to delete every OTHER branch
          # on the mirror — including GitHub's default 'main' (which GitHub refuses,
          # failing the job) and any GitHub-managed branch such as gh-pages. Pushing
          # only ${GITHUB_REF} keeps the mirror in sync and leaves those untouched.
          git push --force "$remote" "+${GITHUB_REF}:${GITHUB_REF}"
